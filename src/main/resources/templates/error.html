<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erro - Gerenciador de Biblioteca</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gerenciador de Biblioteca</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Início</a>
            <a class="nav-link" href="/books">Livros</a>
            <a class="nav-link" href="/customers">Clientes</a>
            <a class="nav-link" href="/sells">Vendas</a>
            <a class="nav-link" href="/stock">Estoque</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0">Ops! Algo deu errado</h4>
                </div>
                <div class="card-body text-center p-5">
                    <h1 class="display-1 text-danger mb-4" th:text="${status != null ? status : '500'}">500</h1>
                    <p class="lead mb-4" th:text="${errorMessage != null ? errorMessage : 'Ocorreu um erro interno no servidor.'}">Mensagem de erro.</p>
                    <a href="/" class="btn btn-primary px-4">Voltar para o Início</a>
                    <button onclick="history.back()" class="btn btn-outline-secondary px-4">Voltar</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
