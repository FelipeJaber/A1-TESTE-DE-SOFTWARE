<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livros - Gerenciador de Biblioteca</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gerenciador de Biblioteca</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Início</a>
            <a class="nav-link active" href="/books">Livros</a>
            <a class="nav-link" href="/customers">Clientes</a>
            <a class="nav-link" href="/sells">Vendas</a>
            <a class="nav-link" href="/stock">Estoque</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Lista de Livros</h1>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Título</th>
            <th>ISBN</th>
            <th>Autor</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}">Título</td>
            <td th:text="${book.isbn}">ISBN</td>
            <td th:text="${book.author.name}">Autor</td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Voltar ao Painel</a>
</div>
</body>
</html>
