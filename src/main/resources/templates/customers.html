<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers - Library Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Library Manager</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/books">Books</a>
            <a class="nav-link active" href="/customers">Customers</a>
            <a class="nav-link" href="/sells">Sells</a>
            <a class="nav-link" href="/stock">Stock</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Customers List</h1>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Register New Customer</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/customers/register}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-3">
                    <label for="cpf" class="form-label">CPF (11 digits)</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" maxlength="11" required>
                </div>
                <div class="col-md-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="col-md-2">
                    <label for="number" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="number" name="number" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Register Customer</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>CPF</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.name}">Name</td>
            <td th:text="${customer.cpf.value}">CPF</td>
            <td th:text="${customer.email.value}">Email</td>
            <td th:text="${customer.number.value}">Phone</td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
