<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Gerenciador de Biblioteca</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gerenciador de Biblioteca</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Início</a>
            <a class="nav-link" href="/books">Livros</a>
            <a class="nav-link active" href="/customers">Clientes</a>
            <a class="nav-link" href="/sells">Vendas</a>
            <a class="nav-link" href="/stock">Estoque</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Lista de Clientes</h1>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Cadastrar Novo Cliente</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/customers/register}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label for="name" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-3">
                    <label for="cpf" class="form-label">CPF (11 dígitos)</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" maxlength="11" required>
                </div>
                <div class="col-md-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="col-md-2">
                    <label for="number" class="form-label">Telefone</label>
                    <input type="text" class="form-control" id="number" name="number" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Cadastrar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>E-mail</th>
            <th>Telefone</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.name}">Nome</td>
            <td th:text="${customer.cpf.value}">CPF</td>
            <td th:text="${customer.email.value}">E-mail</td>
            <td th:text="${customer.number.value}">Telefone</td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Voltar ao Painel</a>
</div>
</body>
</html>
