<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendas - Gerenciador de Biblioteca</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gerenciador de Biblioteca</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Início</a>
            <a class="nav-link" href="/books">Livros</a>
            <a class="nav-link" href="/customers">Clientes</a>
            <a class="nav-link active" href="/sells">Vendas</a>
            <a class="nav-link" href="/stock">Estoque</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Lista de Vendas</h1>

    <div class="card mb-4">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Processar Nova Venda</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/sells/process}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label for="bookId" class="form-label">Livro</label>
                    <select class="form-select" id="bookId" name="bookId" required>
                        <option value="">Selecione um livro...</option>
                        <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="customerId" class="form-label">Cliente</label>
                    <select class="form-select" id="customerId" name="customerId" required>
                        <option value="">Selecione um cliente...</option>
                        <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="employeeId" class="form-label">Funcionário</label>
                    <select class="form-select" id="employeeId" name="employeeId" required>
                        <option value="">Selecione um funcionário...</option>
                        <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="quantity" class="form-label">Quantidade</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="1" value="1" required>
                </div>
                <div class="col-md-3">
                    <label for="price" class="form-label">Preço por Unidade (R$)</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success px-4">Concluir Compra</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Livro</th>
            <th>Cliente</th>
            <th>Funcionário</th>
            <th>Qtd</th>
            <th>Preço</th>
            <th>Data</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sell : ${sells}">
            <td th:text="${sell.book.title}">Livro</td>
            <td th:text="${sell.customer.name}">Cliente</td>
            <td th:text="${sell.employee.name}">Funcionário</td>
            <td th:text="${sell.quantity}">1</td>
            <td th:text="${'R$ ' + sell.price}">R$ 0.00</td>
            <td th:text="${#temporals.format(sell.sellDate, 'dd/MM/yyyy HH:mm')}">Data</td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Voltar ao Painel</a>
</div>
</body>
</html>
