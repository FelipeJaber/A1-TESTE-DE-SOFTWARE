<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Manager - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Library Manager</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/">Home</a>
            <a class="nav-link" href="/books">Books</a>
            <a class="nav-link" href="/customers">Customers</a>
            <a class="nav-link" href="/sells">Sells</a>
            <a class="nav-link" href="/stock">Stock</a>
            <a class="nav-link" href="/h2-console" target="_blank">H2 Console</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Dashboard</h1>
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Books</h5>
                    <p class="card-text display-4" th:text="${bookCount}">0</p>
                    <a href="/books" class="btn btn-outline-light">View Books</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Customers</h5>
                    <p class="card-text display-4" th:text="${customerCount}">0</p>
                    <a href="/customers" class="btn btn-outline-light">View Customers</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Sells</h5>
                    <p class="card-text display-4" th:text="${sellCount}">0</p>
                    <a href="/sells" class="btn btn-outline-light">View Sells</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-info mb-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Inventory</h5>
                    <p class="card-text display-4" th:text="${stockCount}">0</p>
                    <a href="/stock" class="btn btn-outline-light">Check Stock</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
